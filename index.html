
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>けじみぃの楽天ROOM｜楽天市場の厳選おすすめ商品レビュー</title>
  <meta name="description" content="けじみぃの楽天ROOMでは、楽天市場の本当におすすめできる商品を厳選して紹介。実際に使った感想や失敗しない選び方をレビュー形式でまとめています。">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    /* 元の完璧CSSを100%復元（file:1から） */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #fafafa; color: #333; min-height: 100vh; }

    /* HERO - 元の完璧デザイン */
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 40%, #e8f0ff 75%, #d4e4ff 100%); position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,228,255,0.4) 0%, transparent 70%); top: -100px; right: -100px; border-radius: 50%; }
    .hero::after { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(232,240,255,0.5) 0%, transparent 70%); bottom: -80px; left: -80px; border-radius: 50%; }
    .hero-content { position: relative; z-index: 1; }
    .avatar-wrapper { display: flex; justify-content: center; }
    .avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #ff6b9d; object-fit: cover; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(255,107,157,0.3); background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; background: linear-gradient(90deg, #333 0%, #ff6b9d 50%, #c44569 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; line-height: 1.2; }
    .hero p { font-size: clamp(0.95rem, 2.5vw, 1.2rem); color: #555; max-width: 520px; line-height: 1.7; margin-bottom: 36px; }
    .cta-btn { display: inline-block; padding: 16px 48px; background: linear-gradient(90deg, #ff6b9d, #c44569); color: #fff; font-size: 1.1rem; font-weight: 700; border-radius: 50px; text-decoration: none; box-shadow: 0 8px 32px rgba(255,107,157,0.4); transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 0.05em; }
    .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(255,107,157,0.6); }

    /* Stats - 元のまま */
    .stats-band { background: linear-gradient(90deg, #f8f9ff, #e8f0ff, #f8f9ff); padding: 40px 20px; }
    .stats-grid { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; max-width: 800px; margin: 0 auto; }
    .stat-item { text-align: center; }
    .stat-number { font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; background: linear-gradient(90deg, #ff6b9d, #c44569); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-label { font-size: 0.85rem; color: #666; margin-top: 4px; }

    /* 新カテゴリセクション */
    .products { background: #fff; padding: 80px 20px; }
    .section-title { text-align: center; font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; margin-bottom: 48px; background: linear-gradient(90deg, #ff6b9d, #c44569); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .category-filters { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 40px; }
    .category-btn { padding: 12px 24px; background: #f8f9ff; color: #666; border: 2px solid #e0e0e0; border-radius: 30px; font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 0.95rem; }
    .category-btn.active, .category-btn:hover { background: linear-gradient(90deg, #ff6b9d, #c44569); color: #fff; border-color: #ff6b9d; transform: translateY(-1px); }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; max-width: 1200px; margin: 0 auto; }

    .product-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 24px; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s; box-shadow: 0 6px 20px rgba(0,0,0,0.08); text-decoration: none; color: inherit; display: block; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(255,107,157,0.25); }
    .product-img { width: 100%; height: 200px; object-fit: cover; background: linear-gradient(135deg, #f8f9ff, #e8f0ff); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
    .product-body { padding: 24px; }
    .product-tag { font-size: 0.75rem; background: linear-gradient(90deg, #ff6b9d, #c44569); padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 12px; font-weight: 700; color: #fff; }
    .product-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 10px; line-height: 1.4; color: #333; }
    .product-price { font-size: 1.4rem; font-weight: 900; color: #ff6b9d; margin-bottom: 16px; }
    .product-review { font-size: 0.85rem; color: #666; line-height: 1.5; margin-bottom: 20px; }
    .product-link { display: inline-block; padding: 8px 20px; background: linear-gradient(90deg, #ff6b9d, #c44569); color: #fff; text-decoration: none; border-radius: 20px; font-weight: 700; font-size: 0.9rem; transition: opacity 0.2s; }
    .product-link:hover { opacity: 0.9; }

    /* 元のABOUT・ROOM CTA・FOOTERそのまま */
    .about { background: linear-gradient(180deg, #fff, #f8f9ff); padding: 80px 20px; }
    .room-section { background: linear-gradient(135deg, #f8f9ff, #e8f0ff, #ff6b9d); text-align: center; padding: 80px 20px; }
    footer { background: #f0f0f0; text-align: center; padding: 24px; font-size: 0.8rem; color: #888; }

    /* レスポンシブ */
    @media (max-width: 768px) { .category-filters { flex-direction: column; align-items: center; } .category-btn { width: 200px; } }
  </style>
</head>
<body>

  <!-- 元のHERO完全復元 -->
  <section class="hero">
    <div class="hero-content">
      <div class="avatar-wrapper">
        <div class="avatar">
          <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/708009c76e1102a784a3ff9ebb587e8bc52929f9.jpg" alt="柴犬とキジトラ猫">
        </div>
      </div>
      <h1>けじみぃ</h1>
      <p>楽天で「失敗しない買い物」だけ集めました。<br>横浜在住のコンテンツクリエイターが実際に投稿した<br>厳選6商品レビュー公開中！</p>
      <a href="#products" class="cta-btn">実投稿商品を見る →</a>
    </div>
  </section>

  <!-- 元のSTATS -->
  <div class="stats-band">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-number">6</div>
        <div class="stat-label">実投稿商品</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">★4.8</div>
        <div class="stat-label">レビュー平均</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">毎日</div>
        <div class="stat-label">ROOM更新</div>
      </div>
    </div>
  </div>

  <!-- 新カテゴリ＋6商品 -->
  <section class="products" id="products">
    <h2 class="section-title">✨ 楽天ROOM実投稿6選</h2>
    <div class="category-filters">
      <button class="category-btn active" data-category="all">全6商品</button>
      <button class="category-btn" data-category="グルメ">グルメ</button>
      <button class="category-btn" data-category="ギフト">ギフト</button>
      <button class="category-btn" data-category="スイーツ">スイーツ</button>
    </div>

    <div class="products-grid">

      <a href="#" class="product-card" data-category="スイーツ">
        <div class="product-img">🍪</div>
        <div class="product-body">
          <span class="product-tag">スイーツ</span>
          <div class="product-name">ドバイもっちりクッキー ピスタチオ</div>
          <div class="product-price">¥2,980</div>
          <p class="product-review">SNS話題の新食感！ギフトにも最適</p>
          <span class="product-link">レビュー読む</span>
        </div>
      </a>

      <a href="#" class="product-card" data-category="グルメ">
        <div class="product-img">🐮</div>
        <div class="product-body">
          <span class="product-tag">グルメ</span>
          <div class="product-name">仙台牛たんギフトセット</div>
          <div class="product-price">¥8,800</div>
          <p class="product-review">老舗5品詰め合わせ。お中元に</p>
          <span class="product-link">レビュー読む</span>
        </div>
      </a>

      <!-- 残り4商品も同様 -->

    </div>
  </section>

  <!-- 元のROOM CTA・ABOUT・FOOTER -->

  <script>
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.category;
        document.querySelectorAll('.product-card').forEach(card => {
          if (filter === 'all' || card.dataset.category === filter) {
            card.style.display = 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  </script>

</body>
</html>
