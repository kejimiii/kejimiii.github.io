
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>けじみぃの楽天ROOM｜水色爽やかレビュー</title>
  <meta name="description" content="けじみぃの楽天ROOM厳選レビュー。水色で爽やかにリニューアル！実投稿のおすすめ商品まとめ。">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:#f0f8ff;color:#2c3e50;}

    /* 水色ヒーロー */
    .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px;background:linear-gradient(135deg,#e3f2fd 0%,#bbdefb 40%,#90caf9 75%,#64b5f6 100%);position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(100,181,246,.4) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;}
    .hero::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(144,202,249,.5) 0%,transparent 70%);bottom:-80px;left:-80px;border-radius:50%;}

    .avatar-wrapper{display:flex;justify-content:center;margin-bottom:1.5rem;}
    .avatar{width:120px;height:120px;border-radius:50%;border:4px solid #4dabf7;box-shadow:0 12px 40px rgba(77,171,247,.4);background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

    .hero h1{font-size:clamp(2.5rem,7vw,4rem);font-weight:900;background:linear-gradient(90deg,#1565c0,#4dabf7,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem;line-height:1.2;}

    .hero p{font-size:clamp(1rem,2.5vw,1.2rem);color:#456; max-width:520px;line-height:1.7;margin-bottom:2.5rem;}

    .cta-btn{display:inline-block;padding:1.2rem 3rem;background:linear-gradient(90deg,#4dabf7,#2196f3);color:#fff;font-size:1.1rem;font-weight:700;border-radius:50px;text-decoration:none;box-shadow:0 10px 40px rgba(77,171,247,.5);transition:all .3s;}
    .cta-btn:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(77,171,247,.7);}

    /* 水色Stats */
    .stats-band{background:linear-gradient(90deg,#e8f4fd,#bbdefb);padding:3rem 1rem;}
    .stats-grid{display:flex;justify-content:center;gap:4rem;flex-wrap:wrap;max-width:800px;margin:0 auto;}
    .stat-number{font-size:clamp(2.5rem,6vw,3.5rem);font-weight:900;background:linear-gradient(90deg,#4dabf7,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

    /* 水色商品カード */
    .products{background:#fff;padding:5rem 1rem;}
    .section-title{font-size:clamp(2rem,5vw,2.8rem);font-weight:900;text-align:center;margin-bottom:3rem;background:linear-gradient(90deg,#4dabf7,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;max-width:1200px;margin:0 auto;}

    .product-card{background:#fff;border:1px solid #e1f5fe;border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(77,171,247,.15);transition:all .3s;text-decoration:none;color:inherit;}
    .product-card:hover{transform:translateY(-10px);box-shadow:0 25px 50px rgba(77,171,247,.3);}

    .product-img{height:200px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center;font-size:4rem;}

    .product-body{padding:1.8rem;}
    .product-tag{background:linear-gradient(90deg,#4dabf7,#2196f3);color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:.8rem;font-weight:700;display:inline-block;margin-bottom:1rem;}
    .product-name{font-size:1.2rem;font-weight:800;color:#2c3e50;margin-bottom:.8rem;line-height:1.4;}
    .product-price{font-size:1.5rem;font-weight:900;color:#1976d2;margin-bottom:1rem;}
    .product-review{color:#5c6bc0;font-size:.95rem;line-height:1.6;}
    .product-link{background:linear-gradient(90deg,#4dabf7,#2196f3);color:#fff;padding:.8rem 1.8rem;border-radius:25px;font-weight:700;display:inline-block;margin-top:1rem;}

    /* 水色ROOM CTA */
    .room-section{background:linear-gradient(135deg,#e1f5fe,#bbdefb,#4dabf7);padding:5rem 2rem;text-align:center;}
    .room-btn{background:linear-gradient(90deg,#4dabf7,#2196f3);color:#fff;padding:1.3rem 3.5rem;border-radius:50px;font-weight:900;font-size:1.2rem;box-shadow:0 15px 50px rgba(77,171,247,.5);}

    footer{background:#e1f5fe;padding:2rem;text-align:center;color:#5c6bc0;}

    @media (max-width:768px){
      .stats-grid{gap:1.5rem;flex-direction:column;}
      .products-grid{gap:1.5rem;}
      .avatar{width:100px;height:100px;border-width:3px;}
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="avatar-wrapper">
      <div class="avatar">
        <img src="https://pplx-res.cloudinary.com/image/upload/pplx_search_images/708009c76e1102a784a3ff9ebb587e8bc52929f9.jpg" alt="けじみぃアイコン">
      </div>
    </div>
    <div>
      <h1>けじみぃ</h1>
      <p>楽天ROOM厳選レビュー<br>水色で爽やかにリニューアル！</p>
      <a href="#products" class="cta-btn">おすすめを見る</a>
    </div>
  </section>

  <div class="stats-band">
    <div class="stats-grid">
      <div><div class="stat-number">6</div><div>実投稿</div></div>
      <div><div class="stat-number">★4.8</div><div>満足度</div></div>
      <div><div class="stat-number">毎日</div><div>更新</div></div>
    </div>
  </div>

  <section class="products" id="products">
    <h2 class="section-title">実投稿おすすめ</h2>
    <div class="products-grid">
      <!-- 6商品カード（水色版） -->
      <div class="product-card">
        <div class="product-img">🍪</div>
        <div class="product-body">
          <span class="product-tag">スイーツ</span>
          <h3 class="product-name">ドバイもっちりクッキー</h3>
          <div class="product-price">¥2,980</div>
          <p class="product-review">SNS話題のピスタチオ新食感！</p>
          <div class="product-link">詳細</div>
        </div>
      </div>
      <!-- 残り5個同様 -->
    </div>
  </section>

  <section class="room-section">
    <h2>楽天ROOMで全アイテムチェック</h2>
    <a href="https://room.rakuten.co.jp/room_e92d54f94f/items" class="room-btn">ROOMを見る</a>
  </section>

  <footer>
    © 2026 けじみぃ │ Rakuten ROOM
  </footer>

</body>
</html>
